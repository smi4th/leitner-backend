spring.application.name=leitner-backend
# Profiles
spring.profiles.active=local
# Datasource settings
spring.jpa.generate-ddl=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
# Cloud Tasks
app.cloud-tasks.project-id=${CLOUD_TASKS_PROJECT_ID:}
app.cloud-tasks.location=${CLOUD_TASKS_LOCATION:europe-west1}
app.cloud-tasks.queue=${CLOUD_TASKS_QUEUE:card-notifications}
app.cloud-tasks.function-url=${CLOUD_FUNCTION_URL:}
app.cloud-tasks.service-account=${CLOUD_TASKS_SERVICE_ACCOUNT:}
